<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reality in a Digital Age — Live Q&A</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0d2b2b;
    --paper: #e8f4f0;
    --accent: #1a7a5e;
    --accent2: #2196a0;
    --gold: #4ecdc4;
    --soft: #c0ddd8;
    --muted: #5a7f7a;
    --highlight: #d4f0ea;
    --green: #1a7a5e;
    --green-bg: #d4f0ea;
    --blue: #1d6fa4;
    --blue-bg: #d0e8f5;
    --radius: 3px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 15% 20%, rgba(30,140,120,.07) 0%, transparent 50%),
      radial-gradient(circle at 85% 80%, rgba(29,111,164,.07) 0%, transparent 50%),
      url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%230d2b2b' fill-opacity='0.025'%3E%3Cpath d='M0 40 L40 0 L80 40 L40 80 Z' fill='none' stroke='%230d2b2b' stroke-width='.5'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  /* ── SETUP ── */
  #setup-screen { display:none; align-items:center; justify-content:center; min-height:100vh; padding:2rem; }
  .setup-card {
    background: white;
    border: 2px solid var(--ink);
    border-radius: var(--radius);
    padding: 3rem;
    max-width: 500px;
    width: 100%;
    box-shadow: 10px 10px 0 var(--ink);
    animation: slideUp .5s ease;
    position: relative;
    overflow: hidden;
  }
  .setup-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--gold));
  }
  .setup-card h1 {
    font-family: 'Space Mono', monospace;
    font-size: 1.9rem;
    line-height: 1.15;
    margin-bottom: .5rem;
  }
  .setup-card h1 em {
    color: var(--accent2);
    font-style: italic;
    display: block;
  }
  .setup-tag {
    display: inline-block;
    background: var(--green-bg);
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: .72rem;
    padding: .25rem .6rem;
    border-radius: 2px;
    margin-bottom: 1.75rem;
    border: 1px solid var(--soft);
    letter-spacing: .04em;
  }
  .field-group { margin-bottom: 1.25rem; }
  .field-group label {
    display: block;
    font-weight: 600;
    font-size: .8rem;
    letter-spacing: .06em;
    text-transform: uppercase;
    margin-bottom: .4rem;
    color: var(--muted);
  }
  .field-group input {
    width: 100%;
    padding: .75rem 1rem;
    border: 2px solid var(--soft);
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    background: var(--paper);
    transition: border-color .2s;
  }
  .field-group input:focus { outline: none; border-color: var(--accent2); }
  .role-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; margin-bottom: 1.5rem; }
  .role-btn {
    padding: .75rem;
    border: 2px solid var(--soft);
    border-radius: var(--radius);
    background: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: .95rem;
    transition: all .2s;
    color: var(--ink);
  }
  .role-btn.active { background: var(--ink); color: white; border-color: var(--ink); }
  .btn-primary {
    width: 100%;
    padding: .9rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border: none;
    border-radius: var(--radius);
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: .9rem;
    cursor: pointer;
    transition: all .15s;
    letter-spacing: .03em;
  }
  .btn-primary:hover { opacity: .88; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }

  /* ── APP SHELL ── */
  #app { display: none; }
  .app-header {
    background: var(--ink);
    color: white;
    padding: .85rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid var(--gold);
  }
  .app-header h2 {
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    letter-spacing: .02em;
  }
  .app-header h2 span { color: var(--gold); }
  .header-meta { display: flex; align-items: center; gap: .75rem; font-size: .82rem; }
  .session-badge {
    background: rgba(78,205,196,.15);
    color: var(--gold);
    padding: .22rem .7rem;
    border-radius: 99px;
    font-weight: 500;
    border: 1px solid rgba(78,205,196,.3);
    font-family: 'Space Mono', monospace;
    font-size: .75rem;
  }
  .user-badge {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    padding: .22rem .7rem;
    border-radius: 99px;
    font-weight: 600;
    font-size: .8rem;
  }
  .app-body { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }

  /* ── QUESTION BLOCK ── */
  .question-header {
    background: var(--ink);
    color: white;
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 1.5rem 2rem;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
    position: relative;
    overflow: hidden;
  }
  .question-header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--gold));
  }
  .q-number {
    font-family: 'Space Mono', monospace;
    font-size: .82rem;
    color: var(--gold);
    margin-bottom: .4rem;
    letter-spacing: .06em;
  }
  .q-text {
    font-family: 'Space Mono', monospace;
    font-size: 1.25rem;
    line-height: 1.45;
    flex: 1;
    white-space: pre-wrap;
  }
  .q-progress { font-size: .8rem; color: rgba(255,255,255,.4); white-space: nowrap; padding-top: .2rem; }

  .answer-section {
    background: white;
    border: 2px solid var(--ink);
    border-top: none;
    border-radius: 0 0 var(--radius) var(--radius);
    padding: 1.5rem 2rem;
    margin-bottom: 1rem;
  }
  .my-answer-area { margin-bottom: 1.5rem; }
  .my-answer-area label {
    font-weight: 600;
    font-size: .78rem;
    text-transform: uppercase;
    letter-spacing: .07em;
    display: block;
    margin-bottom: .6rem;
    color: var(--muted);
  }
  .my-answer-area textarea {
    width: 100%;
    min-height: 90px;
    padding: .75rem 1rem;
    border: 2px solid var(--soft);
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: .95rem;
    resize: vertical;
    transition: border-color .2s;
    background: var(--paper);
  }
  .my-answer-area textarea:focus { outline: none; border-color: var(--accent2); }
  .my-answer-area textarea:disabled { opacity: .6; cursor: not-allowed; }

  .answer-actions { display: flex; gap: .75rem; flex-wrap: wrap; }
  .btn-submit {
    padding: .65rem 1.5rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border: none;
    border-radius: var(--radius);
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: .82rem;
    cursor: pointer;
    transition: all .15s;
    letter-spacing: .03em;
  }
  .btn-submit:hover { opacity: .85; }
  .btn-submit:disabled { opacity: .4; cursor: not-allowed; }
  .btn-outline {
    padding: .65rem 1.25rem;
    background: none;
    color: var(--ink);
    border: 2px solid var(--soft);
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all .15s;
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

  .divider { border: none; border-top: 2px dashed var(--soft); margin: 1.25rem 0; }
  .responses-label {
    font-weight: 600;
    font-size: .78rem;
    text-transform: uppercase;
    letter-spacing: .07em;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: .5rem;
    color: var(--muted);
  }
  .response-count {
    background: var(--ink);
    color: white;
    font-size: .72rem;
    padding: .1rem .5rem;
    border-radius: 99px;
  }
  .responses-list { display: flex; flex-direction: column; gap: .75rem; }
  .response-card {
    background: var(--paper);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    border-left: 3px solid var(--accent2);
    animation: fadeIn .3s ease;
  }
  .response-card.mine {
    border-left-color: var(--accent);
    background: var(--highlight);
  }
  .response-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: .4rem; }
  .response-name { font-weight: 600; font-size: .82rem; font-family: 'Space Mono', monospace; }
  .response-name.mine-label { color: var(--accent); }
  .response-time { font-size: .72rem; color: var(--muted); }
  .response-text { font-size: .95rem; line-height: 1.6; }
  .no-responses { color: var(--muted); font-style: italic; font-size: .9rem; text-align: center; padding: 1rem 0; }

  /* ── REVEAL ── */
  .reveal-card {
    background: var(--blue-bg);
    border: 2px solid var(--blue);
    border-radius: var(--radius);
    padding: 1.5rem 2rem;
    margin-bottom: 2rem;
    animation: revealPop .5s cubic-bezier(.175,.885,.32,1.275);
    position: relative;
    overflow: hidden;
  }
  .reveal-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent2), var(--gold));
  }
  .reveal-label {
    display: flex;
    align-items: center;
    gap: .5rem;
    font-weight: 700;
    font-size: .78rem;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--blue);
    margin-bottom: .85rem;
    font-family: 'Space Mono', monospace;
  }
  .reveal-title { font-family: 'Space Mono', monospace; font-size: 1.2rem; margin-bottom: .65rem; color: var(--ink); }
  .reveal-body { font-size: .95rem; line-height: 1.75; color: var(--ink); white-space: pre-wrap; margin-bottom: .75rem; }
  .reveal-images { display: flex; flex-wrap: wrap; gap: 1rem; margin-top: .75rem; }
  .reveal-img-wrap {
    flex: 1 1 260px;
    max-width: 100%;
    border-radius: var(--radius);
    overflow: hidden;
    border: 2px solid var(--soft);
    background: white;
  }
  .reveal-img-wrap img { width: 100%; display: block; object-fit: cover; max-height: 300px; }
  .reveal-img-caption { font-size: .78rem; color: var(--muted); padding: .35rem .6rem; background: white; }

  /* Question images */
  .q-image-wrap { margin: .75rem 0; border-radius: var(--radius); overflow: hidden; border: 2px solid rgba(29,111,164,.2); }
  .q-image-wrap img { width: 100%; display: block; max-height: 520px; object-fit: contain; background: #e8f0f5; }

  /* ── PREV QUESTIONS ── */
  .prev-questions { margin-top: .5rem; }
  .prev-questions h3 {
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    margin-bottom: 1rem;
    color: var(--muted);
    letter-spacing: .03em;
  }
  .prev-q-card { border: 1.5px solid var(--soft); border-radius: var(--radius); margin-bottom: 1rem; overflow: hidden; }
  .prev-q-header {
    background: var(--soft);
    padding: .85rem 1.25rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    user-select: none;
  }
  .prev-q-header:hover { background: #afd0ca; }
  .prev-q-title { font-weight: 600; font-size: .88rem; flex: 1; margin-right: 1rem; }
  .prev-q-toggle { font-size: .78rem; color: var(--muted); white-space: nowrap; }
  .prev-q-body { padding: 1.25rem; display: none; }
  .prev-q-body.open { display: block; }

  /* catch-up */
  .catchup-area { margin-top: 1rem; padding-top: 1rem; border-top: 2px dashed var(--soft); }
  .catchup-area label {
    font-weight: 600;
    font-size: .78rem;
    text-transform: uppercase;
    letter-spacing: .06em;
    display: block;
    margin-bottom: .5rem;
    color: var(--accent2);
    font-family: 'Space Mono', monospace;
  }
  .catchup-area textarea {
    width: 100%;
    min-height: 75px;
    padding: .65rem .9rem;
    border: 2px solid var(--soft);
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: .92rem;
    resize: vertical;
    transition: border-color .2s;
    background: var(--paper);
  }
  .catchup-area textarea:focus { outline: none; border-color: var(--accent2); }
  .catchup-area textarea:disabled { opacity: .6; cursor: not-allowed; }
  .catchup-submitted { font-size: .88rem; color: var(--accent); font-weight: 600; margin-top: .5rem; }

  /* ── ADMIN ── */
  .admin-panel {
    background: var(--ink);
    color: white;
    border-radius: var(--radius);
    padding: 1.5rem 2rem;
    margin-bottom: 1rem;
    border-left: 4px solid var(--gold);
  }
  .admin-panel h3 {
    font-family: 'Space Mono', monospace;
    margin-bottom: 1rem;
    color: var(--gold);
    font-size: .95rem;
    letter-spacing: .05em;
  }
  .admin-actions { display: flex; gap: .75rem; flex-wrap: wrap; }
  .btn-admin {
    padding: .6rem 1.2rem;
    background: rgba(255,255,255,.08);
    color: white;
    border: 1.5px solid rgba(255,255,255,.2);
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all .15s;
    font-size: .88rem;
  }
  .btn-admin:hover { background: rgba(255,255,255,.18); }
  .btn-admin.danger { border-color: #ff6b6b; color: #ff9a9a; }
  .btn-admin.danger:hover { background: #c0392b; color: white; border-color: #c0392b; }
  .btn-admin.advance {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border-color: transparent;
    font-weight: 700;
  }
  .btn-admin.advance:hover { opacity: .85; }

  /* Student export */
  .student-panel {
    background: white;
    border: 2px solid var(--soft);
    border-radius: var(--radius);
    padding: 1rem 1.5rem;
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: .75rem;
  }
  .student-panel-label {
    font-size: .78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }
  .student-actions { display: flex; gap: .6rem; flex-wrap: wrap; }
  .btn-student-export {
    padding: .5rem 1.1rem;
    background: var(--paper);
    color: var(--ink);
    border: 1.5px solid var(--soft);
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: .85rem;
    cursor: pointer;
    transition: all .15s;
  }
  .btn-student-export:hover { background: var(--soft); border-color: var(--accent2); color: var(--accent2); }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(4rem);
    background: var(--ink);
    color: white;
    padding: .75rem 1.5rem;
    border-radius: 99px;
    font-size: .88rem;
    font-weight: 500;
    transition: transform .3s ease;
    z-index: 9999;
    pointer-events: none;
    box-shadow: 0 4px 20px rgba(0,0,0,.3);
    border-left: 3px solid var(--gold);
    font-family: 'Space Mono', monospace;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ── MODALS ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 1000; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white;
    border: 2px solid var(--ink);
    border-radius: var(--radius);
    padding: 2rem;
    max-width: 440px;
    width: 90%;
    box-shadow: 8px 8px 0 var(--ink);
    animation: slideUp .2s ease;
  }
  .modal h3 { font-family: 'Space Mono', monospace; font-size: 1.2rem; margin-bottom: .5rem; }
  .modal p { color: var(--muted); margin-bottom: 1.25rem; font-size: .9rem; }
  .modal input {
    width: 100%;
    padding: .75rem 1rem;
    border: 2px solid var(--soft);
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    margin-bottom: 1rem;
    font-size: 1rem;
  }
  .modal input:focus { outline: none; border-color: var(--accent2); }
  .modal-actions { display: flex; gap: .75rem; justify-content: flex-end; }
  .btn-cancel {
    padding: .65rem 1.25rem;
    background: none;
    border: 2px solid var(--soft);
    border-radius: var(--radius);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-confirm {
    padding: .65rem 1.25rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: .82rem;
  }

  @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeIn { from { opacity:0; transform:translateX(-8px); } to { opacity:1; transform:translateX(0); } }
  @keyframes revealPop { from { opacity:0; transform:scale(.95) translateY(12px); } to { opacity:1; transform:scale(1) translateY(0); } }

  @media (max-width:600px) {
    .setup-card { padding: 2rem 1.5rem; }
    .app-header { flex-direction: column; gap: .5rem; align-items: flex-start; }
    .question-header { flex-direction: column; }
    .answer-section, .reveal-card { padding: 1.25rem; }
    .setup-card h1 { font-size: 1.5rem; }
  }
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup-screen">
  <div class="setup-card">
    <h1>Reality<br><em>in a Digital Age</em></h1>
    <div class="setup-tag">// LIVE SESSION Q&amp;A</div>
    <div class="field-group">
      <label>Session ID</label>
      <input type="text" id="session-id" placeholder="e.g. reality-101" value="session-1">
    </div>
    <div class="field-group">
      <label>Your Name</label>
      <input type="text" id="user-name" placeholder="e.g. Alex Johnson">
    </div>
    <div style="margin-bottom:1.25rem">
      <label style="font-weight:600;font-size:.78rem;letter-spacing:.07em;text-transform:uppercase;display:block;margin-bottom:.5rem;color:var(--muted)">Join as</label>
      <div class="role-toggle">
        <button class="role-btn active" onclick="selectRole('student',this)">Student</button>
        <button class="role-btn" onclick="selectRole('admin',this)">Admin</button>
      </div>
    </div>
    <div id="admin-code-field" class="field-group" style="display:none">
      <label>Admin Code</label>
      <input type="password" id="admin-code-input" placeholder="Enter admin code">
    </div>
    <button class="btn-primary" id="join-btn" onclick="joinSession()">Enter Session →</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="app-header">
    <h2>⬡ Reality in a <span>Digital Age</span></h2>
    <div class="header-meta">
      <span class="session-badge" id="header-session"></span>
      <span class="user-badge" id="header-user"></span>
    </div>
  </div>
  <div class="app-body">
    <div class="admin-panel" id="admin-panel" style="display:none">
      <h3>// ADMIN CONTROLS</h3>
      <div class="admin-actions">
        <button class="btn-admin advance" onclick="advanceQuestion()">▶ Next Question</button>
        <button class="btn-admin" onclick="exportAllPDF()">⬇ Export All (PDF)</button>
        <button class="btn-admin" onclick="exportByStudentPDF()">⬇ By Student (PDF)</button>
        <button class="btn-admin danger" onclick="confirmReset()">✕ Reset All</button>
      </div>
    </div>
    <div class="student-panel" id="student-panel" style="display:none">
      <span class="student-panel-label">⬇ Export Answers</span>
      <div class="student-actions">
        <button class="btn-student-export" onclick="exportMyAnswersPDF()">My Answers (PDF)</button>
        <button class="btn-student-export" onclick="exportClassAnswersPDF()">All Class Answers (PDF)</button>
      </div>
    </div>
    <div id="reveal-zone"></div>
    <div id="main-question-block"></div>
    <div id="prev-questions-block"></div>
  </div>
</div>

<div id="toast"></div>

<!-- CONFIRM MODAL -->
<div id="confirm-modal" class="modal-overlay">
  <div class="modal">
    <h3 id="confirm-title">Confirm Action</h3>
    <p id="confirm-msg">Are you sure?</p>
    <input type="password" id="confirm-code" placeholder="Enter admin code to confirm">
    <div class="modal-actions">

// ════════════ REAL-TIME LISTENERS ════════════
let prevIdx = -1;
function startListening() {
  const { onSnapshot, collection } = window._fs;
  onSnapshot(sessionRef, snap => {
    if (!snap.exists()) return;
    const newIdx = snap.data().currentQuestion || 0;
    const didAdvance = newIdx > prevIdx && prevIdx >= 0;
    prevIdx = newIdx;
    currentQuestionIndex = newIdx;
    renderCurrentQuestion();
    renderPreviousQuestions();
    if (didAdvance) renderRevealZone(currentQuestionIndex - 1);
    else if (prevIdx === 0) document.getElementById('reveal-zone').innerHTML = '';
  });
  onSnapshot(collection(db, 'sessions', sessionId, 'answers'), snap => {
    allAnswers = {};
    snap.forEach(d => { allAnswers[d.id] = d.data(); });
    renderCurrentQuestion();
    renderPreviousQuestions();
  });
}

// ════════════ RENDER: REVEAL ZONE ════════════
function renderRevealZone(qIndex) {

const MAX_Q_IMAGES = 10;
function qImageSrcs(qIndex) {
  const num = String(qIndex + 1).padStart(2, '0');
  const srcs = [];
  for (let i = 1; i <= MAX_Q_IMAGES; i++) srcs.push(`images/q${num}image_${i}.png`);
  return srcs;
}

function buildRevealHtml(qIndex) {
  const qObj = QUESTIONS[qIndex];
  if (!qObj) return '';
  const r = qObj.reveal;
  const extra = runtimeImages[qIndex] || [];
  const extraConfigImgs = r?.images || [];
  const primaryImgsHtml = qImageSrcs(qIndex).map((src, i) => `
    <div class="q-image-wrap" id="qimg-${qIndex}-${i+1}">
      <img src="${src}" alt="Question ${qIndex + 1} image ${i + 1}"
        onerror="this.closest('.q-image-wrap').style.display='none'">
    </div>`).join('');
  const allExtra = [...extraConfigImgs, ...extra];
  const extraImgsHtml = allExtra.length ? `
    <div class="reveal-images">
      ${allExtra.map(img => `
        <div class="reveal-img-wrap">
          <img src="${esc(img.src)}" alt="${esc(img.caption||'Image')}" onerror="this.parentElement.style.display='none'">
          ${img.caption ? `<div class="reveal-img-caption">${esc(img.caption)}</div>` : ''}
        </div>`).join('')}
    </div>` : '';
  const hasRevealText = r && (r.title || r.body);
  return `
    <div class="reveal-card">
      ${hasRevealText ? `<div class="reveal-label"><span>◈</span> Instructor Reveal</div>` : ''}
      ${r?.title ? `<div class="reveal-title">${esc(r.title)}</div>` : ''}
      ${r?.body ? `<div class="reveal-body">${esc(r.body)}</div>` : ''}
      ${primaryImgsHtml}
      ${extraImgsHtml}
    </div>`;
}

  const block = document.getElementById('prev-questions-block');

    const responses = getResponsesForQ(i);

    const missedBadge = !myAnswer && !isAdmin ? ' · <span style="color:var(--accent2);font-weight:700">✎ needs answer</span>' : '';

      catchupHtml = `

            <button class="btn-submit" style="font-size:.85rem;padding:.5rem 1.1rem" onclick="submitCatchup(${i})">Submit Answer</button>

      catchupHtml = `<div class="catchup-submitted">✓ You answered this question</div>`;

    html += `
      <div class="prev-q-card">
        <div class="prev-q-header" onclick="togglePrev(${i})">

          <span class="prev-q-toggle" id="ptog-${i}">▼ ${responses.length} response${responses.length!==1?'s':''}${hasReveal ? ' · ◈' : ''}${missedBadge}</span>

        <div class="prev-q-body" id="pbody-${i}">

            ${responses.length === 0 ? '<div class="no-responses">No responses yet.</div>' : responses.map(responseCard).join('')}

}

window.togglePrev = (i) => {
  const body = document.getElementById(`pbody-${i}`);

// ════════════ PDF HELPERS ════════════
function pdfHeader(jdoc, title, sub) {
  const W = jdoc.internal.pageSize.getWidth();
  jdoc.setFillColor(13, 43, 43);
  jdoc.rect(0, 0, W, 68, 'F');
  jdoc.setFillColor(26, 122, 94);
  jdoc.rect(0, 65, W, 3, 'F');
  jdoc.setFont('helvetica', 'bold');
  jdoc.setFontSize(17);
  jdoc.setTextColor(255, 255, 255);
  jdoc.text(title, 40, 36);
  jdoc.setFontSize(9);
  jdoc.setFont('helvetica', 'normal');
  jdoc.setTextColor(160, 210, 200);
  jdoc.text(sub, 40, 54);
  jdoc.setTextColor(13, 43, 43);
  return 88;
}

function pdfText(jdoc, text, x, y, maxW, size, style, rgb) {
  jdoc.setFontSize(size); jdoc.setFont('helvetica', style); jdoc.setTextColor(...rgb);
  const pageH = jdoc.internal.pageSize.getHeight();
  const lines = jdoc.splitTextToSize(String(text || ''), maxW);
  lines.forEach(ln => {
    if (y > pageH - 55) { jdoc.addPage(); y = 48; }
    jdoc.text(ln, x, y); y += size * 1.5;
  });
  return y;
}

// ════════════ EXPORT ALL PDF ════════════
window.exportAllPDF = () => {
  const { jsPDF } = window.jspdf;
  const jdoc = new jsPDF({ orientation: 'portrait', unit: 'pt', format: 'letter' });
  const W = jdoc.internal.pageSize.getWidth(); const M = 42;
  let y = pdfHeader(jdoc, 'Session Export — All Responses', `Session: ${sessionId}   ·   ${new Date().toLocaleString()}`);
  for (let qi = 0; qi < QUESTIONS.length; qi++) {
    const responses = getResponsesForQ(qi);
    if (y > jdoc.internal.pageSize.getHeight() - 90) { jdoc.addPage(); y = 48; }
    jdoc.setFillColor(212, 240, 234);
    jdoc.rect(M, y - 13, W - M * 2, 21, 'F');
    y = pdfText(jdoc, `Q${qi+1}: ${QUESTIONS[qi].text}`, M + 6, y, W - M*2-12, 10.5, 'bold', [13,43,43]);
    y += 4;
    if (responses.length === 0) {
      y = pdfText(jdoc, 'No responses.', M + 10, y, W-M*2-20, 9, 'italic', [90,127,122]);
    } else {
      responses.forEach(r => {
        y = pdfText(jdoc, r.user + ':', M + 10, y, W-M*2-20, 9, 'bold', [26,122,94]);
        y = pdfText(jdoc, r.text, M + 22, y, W-M*2-32, 9.5, 'normal', [40,55,60]);
        y += 2;
      });
    }
    y += 10;
  }
  jdoc.save(`session-${sessionId}-all.pdf`);
  showToast('⬇ All responses PDF downloaded');
};

    jdoc.setFillColor(212, 240, 234);
    jdoc.rect(M, y - 13, W - M * 2, 21, 'F');
    y = pdfText(jdoc, `Q${qi+1}: ${QUESTIONS[qi].text}`, M + 6, y, W-M*2-12, 10.5, 'bold', [13,43,43]);
    y += 4;
    responses.forEach(r => {
      const isMe = r.user === userName;
      y = pdfText(jdoc, `${r.user}${isMe?' (me)':''}:`, M + 10, y, W-M*2-20, 9, 'bold', isMe ? [26,122,94] : [60,80,100]);
      y = pdfText(jdoc, r.text, M + 22, y, W-M*2-32, 9.5, 'normal', [40,55,60]);
      y += 2;
    });
    y += 10;
  }
  jdoc.save(`class-answers-${sessionId}.pdf`);
  showToast('⬇ Class answers PDF downloaded');
};

// ════════════ UTILITIES ════════════
function getResponsesForQ(idx) {
  return Object.values(allAnswers)
    .filter(a => a.questionIndex === idx)
    .sort((a,b) => (a.timestamp?.seconds||0) - (b.timestamp?.seconds||0));
}
function fmtTime(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts.seconds * 1000);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
let _toastT;
window.showToast = (msg) => {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_toastT); _toastT = setTimeout(() => t.classList.remove('show'), 3000);
};
window.closeModal = () => document.getElementById('confirm-modal').classList.remove('open');
</script>
